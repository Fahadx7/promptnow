<script>

var count = parseInt(localStorage.getItem("fai_count") || "0");

var examples = ["أبي موقع لمتجر قهوة","خطة تسويق لمشروعي","ساعدني أكتب إيميل","تطبيق تحليل أسهم","أبي أتعلم البرمجة","Build me a dashboard"];
var exDiv = document.getElementById("examples");
examples.forEach(function(e){
  var b = document.createElement("button");
  b.className = "ex-btn";
  b.textContent = e;
  b.onclick = function(){ document.getElementById("input").value = e; checkInput(); };
  exDiv.appendChild(b);
});

var inp = document.getElementById("input");
inp.addEventListener("input", checkInput);
inp.addEventListener("keydown", function(e){ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();generate();} });

function checkInput(){
  var btn = document.getElementById("genBtn");
  if(inp.value.trim()){
    btn.className="gen-btn active";
  } else {
    btn.className="gen-btn disabled";
  }
}

function generate(){
  var v = inp.value.trim();
  if(!v) return;
  var lang = detectLang(v);
  var cat = detectCat(v);
  var isAr = lang==="ar";
  var tmpl = T[cat.id] || T.general;
  var prompt = isAr ? tmpl.ar(v) : tmpl.en(v);

  document.getElementById("tagCat").textContent = "📂 " + (isAr?cat.ar:cat.en);
  document.getElementById("tagLang").textContent = "🌐 " + (isAr?"عربي":"EN");
  document.getElementById("output").textContent = prompt;
  document.getElementById("resultCard").className = "result-card show";
  document.getElementById("copyBtn").className = "copy-btn";
  document.getElementById("copyBtn").textContent = "📋 نسخ الأمر";

  count++;
  localStorage.setItem("fai_count", count);
  updateCounter();

  setTimeout(function(){
    document.getElementById("resultCard").scrollIntoView({behavior:"smooth",block:"start"});
  }, 100);
}

function copyPrompt(){
  var text = document.getElementById("output").textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text);
  } else {
    var t=document.createElement("textarea");t.value=text;
    document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
  }
  var btn=document.getElementById("copyBtn");
  btn.className="copy-btn copied";
  btn.textContent="✅ تم النسخ!";
  setTimeout(function(){btn.className="copy-btn";btn.textContent="📋 نسخ الأمر";},2000);
}

function updateCounter(){
  if(count>0) document.getElementById("counter").textContent="⚡ "+count+" أمر تم تحويله";
}
